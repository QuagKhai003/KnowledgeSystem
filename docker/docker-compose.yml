version: "3.8"

services:
  neo4j:
    image: neo4j:5-community
    container_name: knowledge_os_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/knowledge_os
    volumes:
      - ./volumes/neo4j:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge_os_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage

  # OpenSearch removed — replaced by SQLite FTS5 (built into Python, no Docker needed)
  # Qdrant provides semantic search, Neo4j provides graph traversal
  # Keyword/BM25 search is handled by SQLite FTS5 at ~/.k-os/fts_index.db
